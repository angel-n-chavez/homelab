apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linkding
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - ld.angelchavez.net
    secretName: linkding-tls-secret
  rules:
    - host: ld.angelchavez.net
      http:
        paths:
          - backend:
              service:
                name: linkding
                port:
                  number: 9090
            path: /
            pathType: Prefix

